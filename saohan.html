        .good-news { color: #059669; font-weight: 800; }

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">

                <input type="number" id="birthYear" value="1984" class="w-full px-4 py-3 border-2 rounded-xl focus:ring-2 focus:ring-red-500 outline-none text-center font-bold text-lg">
            </div>
            <div>

                </select>
            </div>
        </div>

                </div>
                <div class="han-box">

            2007: {sn:"Thổ Tú", sl:"Vân Hớn", hn:"Tam Kheo", hl:"Thiên Tinh"}

        const chiNames = ["Tý", "Sửu", "Dần", "Mão", "Thìn", "Tỵ", "Ngọ", "Mùi", "Thân", "Dậu", "Tuất", "Hợi"];
        const canNames = ["Canh", "Tân", "Nhâm", "Quý", "Giáp", "Ất", "Bính", "Đinh", "Mậu", "Kỷ"];
        function calculate() {
            const birthYear = parseInt(document.getElementById('birthYear').value);
            const currentYear = 2026;
            const gender = document.getElementById('gender').value;
            const tuoiMu = currentYear - birthYear + 1;
            if (!birthYear || birthYear > 2026) return;
            // 1. TUỔI MỤ & CAN CHI
            document.getElementById('resTuoiMu').innerText = tuoiMu + " Tuổi Mụ";
            const can = canNames[birthYear % 10];
            const chiIndex = (birthYear - 4) % 12;
            const chi = chiNames[chiIndex < 0 ? chiIndex + 12 : chiIndex];
            document.getElementById('resCanChi').innerText = can + " " + chi;
            // 2. SAO & HẠN (Dữ liệu chuẩn 2026)
            const data = DATA_2026[birthYear];
            if (data) {
                document.getElementById('resSao').innerText = (gender === 'nam' ? "S. " + data.sn : "S. " + data.sl);
                document.getElementById('resHanNien').innerText = (gender === 'nam' ? "H. " + data.hn : "H. " + data.hl);
            } else {
                document.getElementById('resSao').innerText = "Xem bảng phụ";
                document.getElementById('resHanNien').innerText = "Xem bảng phụ";
            }
            // 3. TAM TAI 2026 (Năm Bính Ngọ)
            const nhomTamTai = ["Hợi", "Mão", "Mùi"];
            let ttText = "Không phạm";
            let ttClass = "good-news";
            if (nhomTamTai.includes(chi)) {
                ttText = "Phạm Tam Tai (Năm 2)";
                ttClass = "bad-news";
            }
            document.getElementById('resTamTai').innerText = ttText;
            document.getElementById('resTamTai').className = "text-lg " + ttClass;
            // 4. THÁI TUẾ 2026 (Năm Bính Ngọ)
            let thText = "Không phạm";
            if (chi === "Ngọ") thText = "Trực Thái Tuế";
            else if (chi === "Tý") thText = "Xung Thái Tuế";
            else if (chi === "Mão") thText = "Hình Thái Tuế";
            else if (chi === "Sửu") thText = "Hại Thái Tuế";
            document.getElementById('resThaiTue').innerText = thText;
            document.getElementById('resThaiTue').className = "text-lg " + (thText === "Không phạm" ? "good-news" : "bad-news");
            // 5. KIM LÂU
            const klDu = tuoiMu % 9;
            let klText = "Không phạm";
            if ([1, 3, 6, 8].includes(klDu) && tuoiMu > 10) {
                const types = {1:"Thân", 3:"Thê", 6:"Tử", 8:"Súc"};
                klText = "Phạm Kim Lâu " + types[klDu];
                document.getElementById('resKimLau').className = "text-lg bad-news";
            } else {
                document.getElementById('resKimLau').className = "text-lg good-news";
            }
            document.getElementById('resKimLau').innerText = klText;
            // 6. HOANG ỐC
            const hoLabels = ["1. Nhất Cát (Tốt)", "2. Nhì Nghi (Tốt)", "3. Tam Địa Sát (Xấu)", "4. Tứ Tấn Tài (Tốt)", "5. Ngũ Thọ Tử (Xấu)", "6. Lục Hoang Ốc (Xấu)"];
            let chuc = Math.floor(tuoiMu / 10);
            let donvi = tuoiMu % 10;
            let hoIdx = (chuc + donvi - 1) % 6;
            if (donvi === 0) hoIdx = (chuc - 1) % 6;
            if (tuoiMu < 10) hoIdx = (tuoiMu - 1) % 6;
            document.getElementById('resHoangOc').innerText = hoLabels[hoIdx];
            document.getElementById('resHoangOc').className = "text-lg " + ([2, 4, 5].includes(hoIdx) ? "bad-news" : "good-news");
            document.getElementById('resultArea').classList.remove('hidden');
        }
