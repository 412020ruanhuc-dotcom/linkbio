<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MẬT MÃ CUỘC ĐỜI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght=400;500;700;900&display=swap');
        
        body { 
            font-family: 'Roboto', sans-serif; 
            background: #f0f2f5; 
            color: #1a1a1a; 
            -webkit-font-smoothing: antialiased;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .card-custom { 
            background: #ffffff; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            margin-bottom: 1rem;
        }

        .btn-action {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .bad-news { color: #dc2626; font-weight: 800; }
        .good-news { color: #059669; font-weight: 800; }
        .label-title { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: #64748b; margin-bottom: 4px; display: block; }
        .han-box { border-radius: 12px; padding: 16px; border: 1px solid #e2e8f0; background: #fff; height: 100%; display: flex; flex-direction: column; justify-content: center; }
        
        .community-card {
            transition: transform 0.2s;
            border-left-width: 8px;
        }
    </style>
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>
</head>
<body class="min-h-screen py-6 px-4 flex justify-center">

    <div class="max-w-md w-full space-y-4">
        
        <div class="card-custom p-6 border-t-[6px] border-red-700">
            <div class="text-center">
                <h1 class="font-black text-2xl text-gray-800 uppercase">MẬT MÃ CUỘC ĐỜI</h1>
                <p class="font-black text-xl text-red-700 uppercase mt-1">TỬ VI - NĂNG LƯỢNG SỐ</p>
            </div>
        </div>

        <div class="space-y-3 text-center">
            <a href="https://youtube.com/@matmacuocdoi" class="card-custom p-4 flex items-center border-red-600 community-card">
                <div class="w-12 text-red-600"><i class="fa-brands fa-youtube text-3xl"></i></div>
                <div class="ml-4 text-left"><p class="font-black text-red-700 uppercase">YOUTUBE</p></div>
            </a>

            <a href="https://tiktok.com/@matmacuocdoi.vn" class="card-custom p-4 flex items-center border-black community-card">
                <div class="w-12 text-black"><i class="fa-brands fa-tiktok text-3xl"></i></div>
                <div class="ml-4 text-left"><p class="font-black text-black uppercase tracking-tight">TIKTOK (KÊNH 1)</p></div>
            </a>

            <a href="https://tiktok.com/@matmacuocdoi.tuvi" class="card-custom p-4 flex items-center border-gray-800 community-card">
                <div class="w-12 text-gray-800"><i class="fa-brands fa-tiktok text-3xl"></i></div>
                <div class="ml-4 text-left"><p class="font-black text-gray-800 uppercase tracking-tight">TIKTOK (KÊNH 2)</p></div>
            </a>
        </div>

        <div class="card-custom p-6 border-t-8 border-[#b91c1c]">
            <h2 class="text-2xl font-black text-center text-slate-800 mb-6 uppercase tracking-tight">Tra Cứu Hạn 2026</h2>
            
            <div class="grid grid-cols-1 gap-4 mb-6">
                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase mb-1 ml-1">Năm sinh (Dương lịch)</label>
                    <input type="number" id="birthYear" placeholder="Ví dụ: 1990" 
                        class="w-full px-4 py-4 border-2 border-slate-200 rounded-2xl text-center font-black text-2xl text-slate-800 focus:border-red-600 focus:ring-4 focus:ring-red-100 outline-none transition-all placeholder:text-slate-300">
                </div>
                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase mb-1 ml-1">Giới tính mạng</label>
                    <select id="gender" class="w-full px-4 py-4 border-2 border-slate-200 rounded-2xl font-black text-lg text-slate-800 bg-white focus:border-red-600 outline-none appearance-none cursor-pointer">
                        <option value="nam">NAM MẠNG</option>
                        <option value="nu">NỮ MẠNG</option>
                    </select>
                </div>
            </div>

            <button onclick="calculate()" class="w-full bg-[#b91c1c] hover:bg-red-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-red-200 transition-all active:scale-[0.98] uppercase text-lg tracking-widest mb-8">
                Xem Kết Quả Ngay
            </button>

            <div id="resultArea" class="hidden space-y-4">
                <div class="p-4 bg-slate-900 rounded-2xl text-center shadow-inner">
                    <p id="resTuoiMu" class="text-2xl font-black text-yellow-400 mb-1"></p>
                    <p id="resCanChi" class="text-sm font-bold text-slate-400 uppercase tracking-[0.3em]"></p>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="han-box bg-blue-50 border-blue-100">
                        <span class="label-title">Sao Chiếu Mệnh</span>
                        <p id="resSao" class="text-lg font-black text-blue-900"></p>
                    </div>
                    <div class="han-box bg-orange-50 border-orange-100">
                        <span class="label-title">Hạn Niên</span>
                        <p id="resHanNien" class="text-lg font-black text-orange-900"></p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="han-box"><span class="label-title">Tam Tai</span><p id="resTamTai" class="text-lg"></p></div>
                    <div class="han-box"><span class="label-title">Thái Tuế</span><p id="resThaiTue" class="text-lg"></p></div>
                    <div class="han-box"><span class="label-title">Kim Lâu</span><p id="resKimLau" class="text-lg"></p></div>
                    <div class="han-box"><span class="label-title">Hoang Ốc</span><p id="resHoangOc" class="text-lg"></p></div>
                </div>
            </div>
        </div>

        <div class="text-center py-6 bg-[#1a1c2e] rounded-[30px]">
            <p class="text-yellow-400 font-black uppercase italic">THAY TƯ DUY ĐỔI VẬN MỆNH</p>
        </div>
    </div>
