<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem Hợp Tuổi - Bản Đẹp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-top: 6px solid #1e40af; }
        .input-group { background: #f1f5f9; border-radius: 12px; padding: 15px; border: 1px solid #e2e8f0; }
        .result-card { background: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        .score-good { color: #059669; font-weight: bold; }
        .score-bad { color: #dc2626; font-weight: bold; }
        .section-title { background: #1e40af; color: white; padding: 8px 15px; font-size: 0.9rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="main-card w-full max-w-lg p-6 md:p-8">
        <h2 class="text-2xl font-black text-center text-blue-800 mb-8 uppercase tracking-wide">Xem Hợp Tuổi Bản Mệnh</h2>
        
        <div class="space-y-6">
            <!-- Người thứ nhất -->
            <div class="input-group">
                <label class="block text-blue-900 font-bold mb-2 flex items-center">
                    <span class="w-6 h-6 bg-blue-600 text-white rounded-full flex items-center justify-center mr-2 text-xs">1</span>
                    Năm sinh người thứ nhất:
                </label>
                <input type="number" id="year1" placeholder="Ví dụ: 1984" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-xl text-center font-bold">
            </div>

            <!-- Người thứ hai -->
            <div class="input-group">
                <label class="block text-red-900 font-bold mb-2 flex items-center">
                    <span class="w-6 h-6 bg-red-600 text-white rounded-full flex items-center justify-center mr-2 text-xs">2</span>
                    Năm sinh người thứ hai:
                </label>
                <input type="number" id="year2" placeholder="Ví dụ: 1988" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none text-xl text-center font-bold">
            </div>

            <button onclick="compareYears()" class="w-full bg-blue-800 hover:bg-blue-900 text-white font-black py-4 rounded-xl transition duration-300 uppercase shadow-xl text-lg tracking-widest">
                Kiểm Tra Độ Hợp
            </button>
        </div>

        <div id="resultArea" class="hidden mt-10 space-y-6">
            
            <!-- Bảng so sánh Can Chi & Ngũ Hành -->
            <div class="result-card shadow-md">
                <div class="section-title">Phân Tích Bản Mệnh</div>
                <div class="p-4 space-y-3">
                    <div class="flex justify-between items-center border-b pb-2">
                        <span class="text-gray-500">Mệnh Người 1:</span>
                        <span id="p1Mệnh" class="font-bold text-gray-800"></span>
                    </div>
                    <div class="flex justify-between items-center border-b pb-2">
                        <span class="text-gray-500">Mệnh Người 2:</span>
                        <span id="p2Mệnh" class="font-bold text-gray-800"></span>
                    </div>
                    <div class="p-3 bg-blue-50 rounded-lg text-center mt-2">
                        <p class="text-xs font-bold text-blue-600 uppercase mb-1">Kết luận Ngũ Hành</p>
                        <p id="resNguHanh" class="font-bold text-gray-900"></p>
                    </div>
                </div>
            </div>

            <!-- Bảng so sánh Cung Phi -->
            <div class="result-card shadow-md">
                <div class="section-title">Phân Tích Cung Phi (Bát Trạch)</div>
                <div class="p-4">
                    <div class="grid grid-cols-2 gap-4 text-center mb-4">
                        <div class="bg-gray-50 p-3 rounded-lg border">
                            <p class="text-[10px] font-bold text-gray-400 uppercase">Cung Nam (1)</p>
                            <p id="p1Nam" class="text-lg font-black text-blue-700"></p>
                        </div>
                        <div class="bg-gray-50 p-3 rounded-lg border">
                            <p class="text-[10px] font-bold text-gray-400 uppercase">Cung Nữ (2)</p>
                            <p id="p2Nu" class="text-lg font-black text-pink-700"></p>
                        </div>
                    </div>
                    <div class="p-3 bg-red-50 rounded-lg text-center border border-red-100">
                        <p class="text-xs font-bold text-red-600 uppercase mb-1">Duyên phận Cung Phi</p>
                        <p id="resCungPhi" class="text-lg font-black text-red-900"></p>
                    </div>
                </div>
            </div>

            <p class="text-center text-xs text-gray-400 italic italic">Lưu ý: Kết quả chỉ mang tính chất tham khảo theo dân gian.</p>
        </div>

        <p id="errorMsg" class="hidden text-center text-red-500 mt-6 font-bold italic">Vui lòng nhập năm trong khoảng 1930 - 2069</p>
    </div>

            const y2 = document.getElementById('year2').value;
            const resultArea = document.getElementById('resultArea');
            const errorMsg = document.getElementById('errorMsg');

                const p2 = data[y2];

                // Hiển thị thông tin

                document.getElementById('p2Mệnh').innerText = p2[1] + " (" + p2[2] + ")";

                document.getElementById('p2Nu').innerText = p2[4];

                const keyNH = p1[2] + "-" + p2[2];
                document.getElementById('resNguHanh').innerText = sinhKhac[keyNH] || "Bình Hòa";

                // Luận cung phi
                const keyCP = p1[3] + "-" + p2[4];
                const ketQuaCP = hopCung[keyCP] || "Chưa rõ";
                document.getElementById('resCungPhi').innerText = ketQuaCP;

                errorMsg.classList.add('hidden');
                resultArea.classList.remove('hidden');
            } else {
                resultArea.classList.add('hidden');
                errorMsg.classList.remove('hidden');
            }
        }
