<body class="min-h-screen flex items-center justify-center p-4">
    <div class="main-card w-full max-w-xl p-6 md:p-10">

        <p class="text-center text-gray-500 text-sm mb-6 font-semibold italic">Dữ liệu Sao-Hạn theo bảng chuẩn & Logic Tứ Đại Hạn</p>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">

                <label class="block text-sm font-bold text-gray-700 mb-1">Năm sinh (Dương lịch):</label>
                <input type="number" id="birthYear" value="1984" class="w-full px-4 py-3 border-2 rounded-xl focus:ring-2 focus:ring-red-500 outline-none text-center font-bold text-lg">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Năm xem hạn:</label>

            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-bold text-gray-700 mb-1">Giới tính:</label>
                <select id="gender" class="w-full px-4 py-3 border-2 rounded-xl font-bold bg-white outline-none">
                    <option value="nam">Nam mạng</option>
                    <option value="nu">Nữ mạng</option>
                </select>
            </div>
        </div>

        <button onclick="calculate()" class="w-full bg-red-700 hover:bg-red-800 text-white font-black py-4 rounded-xl shadow-lg transition duration-300 uppercase text-lg mb-8">
            Xem Kết Quả Chuẩn
        </button>

        <div id="resultArea" class="hidden space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="han-box bg-blue-50">

                    <p id="resSao" class="text-xl font-black text-blue-900"></p>
                </div>
                <div class="han-box bg-orange-50">
                    <span class="label-title">Hạn Niên</span>
                    <p id="resHanNien" class="text-xl font-black text-orange-900"></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="han-box">
                    <span class="label-title">Tam Tai</span>
                    <p id="resTamTai" class="text-lg"></p>
                </div>
                <div class="han-box">
                    <span class="label-title">Thái Tuế</span>
                    <p id="resThaiTue" class="text-lg"></p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="han-box">
                    <span class="label-title">Kim Lâu</span>
                    <p id="resKimLau" class="text-lg"></p>
                </div>
                <div class="han-box">
                    <span class="label-title">Hoang Ốc</span>
                    <p id="resHoangOc" class="text-lg"></p>
                </div>
            </div>

            <div class="p-4 bg-gray-900 text-white rounded-xl text-center">
                <p id="resTuoiMu" class="text-2xl font-black text-yellow-400"></p>
                <p id="resCanChi" class="text-sm font-bold text-gray-400 uppercase tracking-widest mt-1"></p>
            </div>
        </div>
    </div>
